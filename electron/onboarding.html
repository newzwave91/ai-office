<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AI 팀장 오피스 — 설정</title>
  <link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Galmuri11', monospace; background: #0a0a0f; color: #cfe8d8; padding: 26px; }
    h1 { font-size: 18px; color: #38f08a; margin: 0 0 4px; letter-spacing: 1px; }
    .sub { font-size: 11px; color: #6b8a78; margin-bottom: 18px; }
    .step { border: 1px solid #1d3a2b; border-radius: 8px; padding: 13px 15px; margin-bottom: 10px; background: #0d140f; }
    .step.active { border-color: #38f08a; box-shadow: 0 0 0 1px #38f08a33; }
    .step.done { opacity: .65; }
    .row { display: flex; align-items: center; gap: 10px; }
    .badge { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #2c5240; display: flex; align-items: center; justify-content: center; font-size: 12px; flex: 0 0 auto; }
    .badge.ok { background: #38f08a; color: #04130b; border-color: #38f08a; }
    .badge.spin { border-top-color: #38f08a; animation: sp 0.8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .title { font-size: 13px; }
    .desc { font-size: 11px; color: #7fa890; margin-top: 4px; }
    button { font-family: inherit; background: #14241a; color: #38f08a; border: 1px solid #2c6b45; border-radius: 6px; padding: 8px 14px; font-size: 12px; cursor: pointer; margin-top: 10px; }
    button:hover { background: #1c3526; }
    button:disabled { opacity: .4; cursor: default; }
    #log { font-size: 10px; color: #5f7d6b; background: #060a07; border: 1px solid #16271d; border-radius: 6px; padding: 8px; height: 80px; overflow: auto; white-space: pre-wrap; margin-top: 8px; display: none; }
    .err { color: #ff7a7a; font-size: 11px; margin-top: 6px; }
    .start { width: 100%; padding: 13px; font-size: 14px; margin-top: 8px; }
    .form { margin-top: 10px; display: none; }
    .form label { display: block; font-size: 10px; color: #7fa890; margin: 8px 0 3px; }
    .form input { width: 100%; font-family: inherit; font-size: 12px; padding: 7px 9px; background: #060a07; border: 1px solid #2c5240; border-radius: 5px; color: #cfe8d8; }
    .form input:focus { outline: none; border-color: #38f08a; }
  </style>
</head>
<body>
  <h1>AI 팀장 오피스</h1>
  <div class="sub">Claude 인증 후 회사 정보를 입력하면 바로 시작합니다.</div>

  <div class="step" id="s1">
    <div class="row"><div class="badge" id="b1">1</div><div class="title">Claude Code 확인 / 설치</div></div>
    <div class="desc" id="d1">시스템에 Claude Code가 있는지 확인합니다…</div>
    <button id="btn-install" style="display:none">Claude Code 설치하기</button>
    <div id="log"></div>
    <div class="err" id="e1"></div>
  </div>

  <div class="step" id="s2">
    <div class="row"><div class="badge" id="b2">2</div><div class="title">Claude 계정 로그인</div></div>
    <div class="desc" id="d2">대기 중…</div>
    <button id="btn-login" style="display:none">로그인 창 열기</button>
    <div class="err" id="e2"></div>
  </div>

  <div class="step" id="s3">
    <div class="row"><div class="badge" id="b3">3</div><div class="title">회사 정보</div></div>
    <div class="desc" id="d3">인증이 끝나면 입력합니다.</div>
    <div class="form" id="company-form">
      <label>회사명</label><input id="f-name" placeholder="예: ○○ 컴퍼니" />
      <label>업종 / 하는 일</label><input id="f-industry" placeholder="예: 마케팅 에이전시, 컨설팅" />
      <label>주요 고객 또는 제품</label><input id="f-customers" placeholder="예: 중소기업 고객, 지역 고객" />
      <label>내 역할</label><input id="f-role" placeholder="예: 대표 / 마케팅 담당" />
      <label>문서 스타일 (선택)</label><input id="f-docStyle" placeholder="추천에 맞게." />
      <button id="btn-company">저장하고 계속</button>
      <div class="err" id="e3"></div>
    </div>
  </div>

  <div class="step" id="s4">
    <div class="row"><div class="badge" id="b4">4</div><div class="title">오피스 시작</div></div>
    <div class="desc" id="d4">위 단계가 끝나면 활성화됩니다.</div>
    <button id="btn-start" class="start" disabled>오피스 실행</button>
  </div>

  <script>
    const $ = id => document.getElementById(id)
    const setBadge = (n, state) => { const b = $('b' + n); b.className = 'badge' + (state ? ' ' + state : ''); if (state === 'ok') b.textContent = '✓'; else if (state === 'spin') b.textContent = ''; else b.textContent = n }
    const setStep = (n, cls) => { $('s' + n).className = 'step' + (cls ? ' ' + cls : '') }
    let pollTimer = null

    async function step1() {
      setStep(1, 'active'); setBadge(1, 'spin'); $('d1').textContent = 'Claude Code 확인 중…'
      const r = await window.office.checkClaude()
      if (r.installed) { setBadge(1, 'ok'); setStep(1, 'done'); $('d1').textContent = '설치됨 (' + r.version + ')'; return step2() }
      setBadge(1); $('d1').textContent = 'Claude Code가 없습니다. 아래 버튼으로 설치하세요. (Node 불필요)'
      const btn = $('btn-install'); btn.style.display = 'inline-block'
      btn.onclick = async () => {
        btn.disabled = true; setBadge(1, 'spin'); $('log').style.display = 'block'; $('d1').textContent = '설치 중… (수 분 소요될 수 있습니다)'
        window.office.onInstallLog(line => { const l = $('log'); l.textContent += line; l.scrollTop = l.scrollHeight })
        const res = await window.office.installClaude()
        if (res.ok) { setBadge(1, 'ok'); setStep(1, 'done'); $('d1').textContent = '설치 완료 (' + res.version + ')'; step2() }
        else { setBadge(1); btn.disabled = false; $('e1').textContent = res.error || '설치 실패' }
      }
    }

    async function step2() {
      setStep(2, 'active'); setBadge(2, 'spin'); $('d2').textContent = '로그인 상태 확인 중…'
      const r = await window.office.authStatus()
      if (r.loggedIn) return step3(r)
      setBadge(2); $('d2').textContent = 'Claude 계정 로그인이 필요합니다.'
      const btn = $('btn-login'); btn.style.display = 'inline-block'
      btn.onclick = async () => {
        $('d2').textContent = '열린 터미널 창에서 로그인을 완료하세요. 자동으로 감지합니다…'
        setBadge(2, 'spin')
        await window.office.authLogin()
        if (pollTimer) clearInterval(pollTimer)
        pollTimer = setInterval(async () => {
          const s = await window.office.authStatus()
          if (s.loggedIn) { clearInterval(pollTimer); step3(s) }
        }, 3000)
      }
    }

    async function step3(authInfo) {
      setBadge(2, 'ok'); setStep(2, 'done')
      $('d2').textContent = '로그인됨' + (authInfo.email ? ' — ' + authInfo.email : '') + (authInfo.plan ? ' (' + authInfo.plan + ')' : '')
      setStep(3, 'active'); setBadge(3)
      $('d3').textContent = '회사 정보를 입력하세요. (나중에 다시 실행해 수정할 수 있습니다)'
      $('company-form').style.display = 'block'
      // 기존 값 미리 채우기
      const c = await window.office.getCompany()
      $('f-name').value = c.name || ''
      $('f-industry').value = c.industry || ''
      $('f-customers').value = c.customers || ''
      $('f-role').value = c.role || ''
      $('f-docStyle').value = c.docStyle || ''
      const btn = $('btn-company')
      btn.onclick = async () => {
        btn.disabled = true; setBadge(3, 'spin')
        const info = {
          name: $('f-name').value, industry: $('f-industry').value,
          customers: $('f-customers').value, role: $('f-role').value, docStyle: $('f-docStyle').value
        }
        const r = await window.office.saveCompany(info)
        if (r.ok) { setBadge(3, 'ok'); setStep(3, 'done'); $('d3').textContent = (info.name || '회사 정보') + ' 저장됨'; enableStart() }
        else { setBadge(3); btn.disabled = false; $('e3').textContent = r.error || '저장 실패' }
      }
    }

    function enableStart() {
      setStep(4, 'active'); $('d4').textContent = '준비 완료. 오피스를 실행하세요.'
      const btn = $('btn-start'); btn.disabled = false
      btn.onclick = async () => { btn.disabled = true; btn.textContent = '시작하는 중…'; await window.office.startApp() }
    }

    step1()
  </script>
</body>
</html>
